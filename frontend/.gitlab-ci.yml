# Required CI/CD variables (Settings > CI/CD > Variables):
#   DEPLOY_HOST       - hostname or IP of the target NixOS server
#   DEPLOY_SSH_KEY    - private SSH key for the deploy user on DEPLOY_HOST
#   GITLAB_TOKEN      - GitLab token for private npm package install during docker build
stages:
  - build
  - deploy

.build-template:
  image: docker:26.1
  stage: build
  tags:
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: /certs
    - shared
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  after_script:
    - docker logout $CI_REGISTRY

.deploy-template:
  image: alpine:3.20
  stage: deploy
  tags:
    - shared
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

# VITE_PAULINE_API is always /api/v1 for both prod and dev builds.
# Vite bakes this value into the JS bundle at build time — runtime env has no effect.
# /api/v1 is a reverse-proxy-relative path that resolves correctly on any domain
# (pauline-upb.de or dev.pauline-upb.de), so no per-environment value is needed.

build:latest:
  extends: .build-template
  script:
    - docker build
      --build-arg GITLAB_TOKEN=$GITLAB_TOKEN
      --build-arg VITE_PAULINE_API=/api/v1
      -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

build:dev:
  extends: .build-template
  script:
    - docker build
      --build-arg GITLAB_TOKEN=$GITLAB_TOKEN
      --build-arg VITE_PAULINE_API=/api/v1
      -t $CI_REGISTRY_IMAGE:dev .
    - docker push $CI_REGISTRY_IMAGE:dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy:prod:
  extends: .deploy-template
  script:
    - ssh deploy@$DEPLOY_HOST
      "docker compose -f /srv/pauline/prod/docker-compose.yml pull frontend &&
       docker compose -f /srv/pauline/prod/docker-compose.yml up -d --no-deps frontend"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
  needs:
    - build:latest

deploy:dev:
  extends: .deploy-template
  script:
    - ssh deploy@$DEPLOY_HOST
      "docker compose -f /srv/pauline/dev/docker-compose.yml pull frontend &&
       docker compose -f /srv/pauline/dev/docker-compose.yml up -d --no-deps frontend"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: on_success
  needs:
    - build:dev
