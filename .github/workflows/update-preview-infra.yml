---
name: Deploy application

"on":
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request:
    types: [closed, reopened]
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch:

jobs:
  deploy-main:
    if: >
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_branch == 'main'
      && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PAULINE_PREVIEW_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 88.198.127.131 >> ~/.ssh/known_hosts

      - name: Deploy main container
        run: |
          set -euo pipefail
          REMOTE='pauline-deploy@88.198.127.131'
          ssh "$REMOTE" \
            sudo -n /run/current-system/sw/bin/pauline-preview \
            deploy-main ghcr.io/${{ github.repository }}:latest

  deploy-preview:
    # Only deploy PRs whose source branch is in this repository. Fork PRs do not
    # get preview deployment credentials or server access.
    if: >
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Compute preview label
        id: preview
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            echo "Branch '$BRANCH' produced an empty preview slug" >&2
            exit 1
          fi
          LABEL=$(printf '%s' "$SLUG" | cut -c1-63 | sed 's/-$//')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PAULINE_PREVIEW_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 88.198.127.131 >> ~/.ssh/known_hosts

      - name: Deploy preview container
        env:
          LABEL: ${{ steps.preview.outputs.label }}
          IMAGE_REPO: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ steps.preview.outputs.image_tag }}
        run: |
          set -euo pipefail
          REMOTE='pauline-deploy@88.198.127.131'
          IMAGE="$IMAGE_REPO:$IMAGE_TAG"
          ssh "$REMOTE" \
            sudo -n /run/current-system/sw/bin/pauline-preview \
            deploy "$LABEL" "$IMAGE"
          echo "Preview deployed at https://$LABEL.preview.new.pauline-upb.de"

      - name: Publish preview URL
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ github.token }}
          PREVIEW_HOST: >
            ${{ steps.preview.outputs.label }}.preview.new.pauline-upb.de
        run: |
          set -euo pipefail
          PREVIEW_URL="https://$PREVIEW_HOST"
          echo "::notice title=Pauline preview::$PREVIEW_URL"
          {
            echo "## Pauline preview"
            echo
            echo "Preview URL: $PREVIEW_URL"
          } >> "$GITHUB_STEP_SUMMARY"

          gh pr comment "$BRANCH" \
            --repo "$GITHUB_REPOSITORY" \
            --edit-last \
            --create-if-none \
            --body "Pauline preview deployed: $PREVIEW_URL"

  remove-preview:
    if: >
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Compute preview label
        id: preview
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            echo "Branch '$BRANCH' produced an empty preview slug" >&2
            exit 1
          fi
          LABEL=$(printf '%s' "$SLUG" | cut -c1-63 | sed 's/-$//')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PAULINE_PREVIEW_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 88.198.127.131 >> ~/.ssh/known_hosts

      - name: Remove preview container and database
        env:
          LABEL: ${{ steps.preview.outputs.label }}
        run: |
          set -euo pipefail
          REMOTE='pauline-deploy@88.198.127.131'
          ssh "$REMOTE" \
            sudo -n /run/current-system/sw/bin/pauline-preview \
            remove "$LABEL"
          echo "Preview removed for $LABEL"

      - name: Publish removal comment
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ steps.preview.outputs.label }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "Pauline preview removed: https://$LABEL.preview.new.pauline-upb.de"

  note-reopen:
    if: >
      github.event_name == 'pull_request'
      && github.event.action == 'reopened'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Publish reopen note
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "Pauline preview will be redeployed after CI passes on the reopened PR."

  prune-previews:
    if: >
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PAULINE_PREVIEW_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 88.198.127.131 >> ~/.ssh/known_hosts

      - name: Remove stale previews
        run: |
          set -euo pipefail
          REMOTE='pauline-deploy@88.198.127.131'
          ssh "$REMOTE" \
            sudo -n /run/current-system/sw/bin/pauline-preview \
            prune 7
