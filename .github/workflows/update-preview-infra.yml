---
name: Deploy branch preview

"on":
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy-preview:
    if: >
      ${{ github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch != 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Compute preview label
        id: preview
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            echo "Branch '$BRANCH' produced an empty preview slug" >&2
            exit 1
          fi
          SLUG=$(printf '%s' "$SLUG" | cut -c1-48 | sed 's/-$//')
          SECRET=$(printf '%s:%s' "$BRANCH" "$SHA" \
            | sha256sum \
            | cut -c1-12)
          LABEL="$SLUG-$SECRET"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PAULINE_PREVIEW_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 88.198.127.131 >> ~/.ssh/known_hosts

      - name: Deploy preview container
        env:
          LABEL: ${{ steps.preview.outputs.label }}
          IMAGE_REPO: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ steps.preview.outputs.image_tag }}
        run: |
          set -euo pipefail
          REMOTE='pauline-deploy@88.198.127.131'
          IMAGE="$IMAGE_REPO:$IMAGE_TAG"
          ssh "$REMOTE" \
            sudo -n /run/current-system/sw/bin/pauline-preview \
            deploy "$LABEL" "$IMAGE"
          echo "Preview deployed at https://$LABEL.preview.new.pauline-upb.de"

      - name: Publish preview URL
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ github.token }}
          PREVIEW_HOST: >
            ${{ steps.preview.outputs.label }}.preview.new.pauline-upb.de
        run: |
          set -euo pipefail
          PREVIEW_URL="https://$PREVIEW_HOST"
          echo "::notice title=Pauline preview::$PREVIEW_URL"
          {
            echo "## Pauline preview"
            echo
            echo "Preview URL: $PREVIEW_URL"
          } >> "$GITHUB_STEP_SUMMARY"

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" \
              --edit-last \
              --create-if-none \
              --body "Pauline preview deployed: $PREVIEW_URL"
          fi
