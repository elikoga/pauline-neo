name: CI

on:
  push:

jobs:
  typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend

  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: read
      packages: write
    outputs:
      branch-slug: ${{ steps.slug.outputs.slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch slug
        id: slug
        run: |
          SLUG=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.slug.outputs.slug }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref_name != 'main'
    steps:
      - name: Trigger preview deploy
        run: |
          curl -fsS --max-time 120 \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"branch\":\"${{ needs.build-push.outputs.branch-slug }}\",\"image\":\"ghcr.io/${{ github.repository }}:${{ needs.build-push.outputs.branch-slug }}\"}" \
            "${{ secrets.WEBHOOK_URL }}/hooks/deploy-preview"

  deploy-prod:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref_name == 'main'
    steps:
      - name: Trigger prod deploy
        run: |
          curl -fsS --max-time 120 \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"image\":\"ghcr.io/${{ github.repository }}:latest\"}" \
            "${{ secrets.WEBHOOK_URL }}/hooks/deploy-prod"
