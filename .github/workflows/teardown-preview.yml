name: Teardown preview

on:
  delete:

jobs:
  teardown:
    name: Remove preview container
    runs-on: ubuntu-latest
    # Only fire for branch deletions, not tag deletions.
    if: github.event.ref_type == 'branch'
    steps:
      - name: Compute branch slug
        id: slug
        run: |
          SLUG=$(echo "${{ github.event.ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Trigger teardown
        run: |
          curl -fsS --max-time 60 \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"branch\":\"${{ steps.slug.outputs.slug }}\"}" \
            "${{ secrets.WEBHOOK_URL }}/hooks/teardown-preview"
